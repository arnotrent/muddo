{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Messages — Agent Portal</title>
<link rel="icon" type="image/png" href="{% static 'images/logo_full.png' %}">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/theme_vars.css' %}">
<link rel="stylesheet" href="{% static 'css/style.css' %}">
<link rel="stylesheet" href="{% static 'css/animations.css' %}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script>(function(){var t=localStorage.getItem('muddo-theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
<style>
*{box-sizing:border-box;}
body{margin:0;height:100vh;display:flex;flex-direction:column;background:var(--bg);}
.agent-topbar{height:60px;background:var(--bg-card);border-bottom:1.5px solid var(--border-color);padding:0 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.chat-wrap{display:flex;flex-direction:column;flex:1;min-height:0;}
.chat-header{padding:14px 18px;background:var(--bg-card);border-bottom:1px solid var(--border-color);display:flex;align-items:center;gap:12px;flex-shrink:0;}
[data-theme="dark"] .chat-header{background:#120a04;border-bottom-color:#2a1808;}
.chat-messages{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:11px;background:var(--bg);}
[data-theme="dark"] .chat-messages{background:#0e0804;}
.msg-row{display:flex;align-items:flex-end;gap:8px;}
.msg-row.sent{flex-direction:row-reverse;}
.msg-avatar-sm{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.7rem;color:#fff;flex-shrink:0;}
.msg-bubble{max-width:72%;padding:9px 14px;border-radius:16px;font-size:.9rem;line-height:1.62;word-break:break-word;}
.msg-row.received .msg-bubble{background:var(--bg-card);border:1px solid var(--border-color);border-bottom-left-radius:4px;color:var(--text-primary);}
[data-theme="dark"] .msg-row.received .msg-bubble{background:#1e1008;border-color:#2a1808;}
.msg-row.sent .msg-bubble{background:var(--orange);color:#fff;border-bottom-right-radius:4px;}
.msg-time{display:block;font-size:.65rem;opacity:.52;margin-top:3px;text-align:right;}
.chat-input-bar{padding:12px 16px;border-top:1.5px solid var(--border-color);display:flex;gap:10px;background:var(--bg-card);flex-shrink:0;}
[data-theme="dark"] .chat-input-bar{background:#120a04;border-top-color:#2a1808;}
.chat-input-bar textarea{flex:1;padding:10px 14px;border:1.5px solid var(--border-color);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:.9rem;background:var(--bg-input);color:var(--text-primary);resize:none;height:42px;max-height:120px;transition:border-color .2s;line-height:1.5;}
.chat-input-bar textarea:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,101,26,.1);}
.send-btn{padding:10px 18px;background:var(--orange);color:#fff;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;align-self:flex-end;transition:background .2s;white-space:nowrap;}
.send-btn:hover{background:var(--orange-dark);}
.empty-chat{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;color:var(--text-muted);text-align:center;padding:40px;}
</style>
</head>
<body data-user-id="{{ agent.id }}" data-user-role="agent" data-user-initial="{{ agent.name|first|upper }}">

<!-- Topbar -->
<div class="agent-topbar">
  <div style="display:flex;align-items:center;gap:10px;">
    <a href="{% url 'agent_dashboard' %}" style="color:var(--text-muted);font-size:.9rem;text-decoration:none;padding:6px;border-radius:8px;transition:background .2s;" onmouseover="this.style.background='var(--bg-alt)'" onmouseout="this.style.background='transparent'">
      <i class="fas fa-arrow-left"></i>
    </a>
    <img src="{% static 'images/logo_full.png' %}" alt="MACL" style="height:32px;border-radius:6px;background:var(--bg-alt);padding:2px;">
    <span style="font-family:'DM Sans',sans-serif;font-weight:800;font-size:.92rem;color:var(--text-primary);">Muddo Agro — Agent Portal</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span style="font-size:.8rem;color:var(--text-muted);">{{ agent.name }}</span>
    <button onclick="toggleTheme()" style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:1rem;padding:4px;"><i class="fas fa-moon" data-theme-icon></i></button>
    <a href="{% url 'logout' %}" style="font-size:.8rem;color:var(--text-muted);text-decoration:none;padding:6px 10px;border-radius:8px;border:1px solid var(--border-color);transition:all .2s;" onmouseover="this.style.borderColor='var(--orange)';this.style.color='var(--orange)'" onmouseout="this.style.borderColor='var(--border-color)';this.style.color='var(--text-muted)'">
      <i class="fas fa-sign-out-alt"></i> Logout
    </a>
  </div>
</div>

<!-- Chat area -->
<div class="chat-wrap">
  <div class="chat-header">
    <div style="width:38px;height:38px;border-radius:50%;background:var(--blue-dark);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem;flex-shrink:0;">A</div>
    <div>
      <div style="font-weight:800;font-size:.96rem;color:var(--text-primary);">Muddo Agro Admin</div>
      <div style="font-size:.74rem;color:var(--text-muted);display:flex;align-items:center;gap:5px;">
        <span style="width:7px;height:7px;border-radius:50%;background:#4caf50;display:inline-block;"></span>
        Head Office · Kampala
      </div>
    </div>
    <div style="margin-left:auto;font-size:.78rem;color:var(--text-muted);">
      <i class="fas fa-phone" style="color:var(--orange);margin-right:5px;"></i>
      <a href="tel:+256772507582" style="color:var(--orange);">+256 772 507582</a>
    </div>
  </div>

  <div class="chat-messages" id="chatMessages">
    <div class="empty-chat" id="chatLoadingState">
      <i class="fas fa-comments" style="font-size:2.5rem;margin-bottom:12px;opacity:.3;"></i>
      <p style="font-size:.86rem;">Loading messages…</p>
    </div>
  </div>

  <div class="chat-input-bar">
    <textarea id="chatInput" placeholder="Type a message… (Enter to send, Shift+Enter for new line)"></textarea>
    <button id="chatSendBtn" class="send-btn"><i class="fas fa-paper-plane"></i> Send</button>
  </div>
</div>

<script>window._adminId = {{ admin_id }};</script>
<script src="{% static 'js/theme.js' %}"></script>
<script src="{% static 'js/chat.js' %}"></script>
<script>
document.addEventListener('DOMContentLoaded', function(){
  const loadingState = document.getElementById('chatLoadingState');
  if(loadingState) loadingState.remove();

  if(window.muddoChat){
    // Auto-select admin contact for agent view
    const fakeContact = {
      dataset: {
        id:     String(window._adminId),
        role:   'admin',
        name:   'Admin',
        status: 'online',
      },
      classList: { remove(){}, add(){} },
      querySelector(){ return null; },
    };
    window.muddoChat.selectContact(fakeContact);
  }
});
</script>
</body>
</html>
